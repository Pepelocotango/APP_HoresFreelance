name: PWA + Electron Desktop Build

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # 1. Build de la PWA (artefacte web ZIP)
  # ─────────────────────────────────────────────
  build-pwa:
    name: Build PWA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_PWA/horesfreelance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          package-manager: pnpm
          cache: 'pnpm'
          cache-dependency-path: app_PWA/horesfreelance/pnpm-lock.yaml

      - name: Instal·lar dependències
        run: pnpm install

      - name: Lint (TypeScript)
        run: pnpm run lint

      - name: Build Vite
        run: pnpm run build

      - name: Comprimir dist/ a ZIP
        run: zip -r ../../app_PWA-C${{ github.run_number }}.zip dist/

      - name: Pujar artefacte PWA (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: app_PWA-C${{ github.run_number }}
          path: app_PWA-C${{ github.run_number }}.zip
          retention-days: 30

  # ─────────────────────────────────────────────
  # 2. Electron Linux → AppImage + .deb
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Electron Linux
    runs-on: ubuntu-latest
    needs: build-pwa
    defaults:
      run:
        working-directory: app_PWA/horesfreelance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          package-manager: pnpm
          cache: 'pnpm'
          cache-dependency-path: app_PWA/horesfreelance/pnpm-lock.yaml

      - name: Instal·lar dependències del sistema (per a AppImage)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libarchive-tools rpm

      - name: Instal·lar dependències
        run: pnpm install

      - name: Build Vite + Electron (Linux)
        run: pnpm run electron:build:linux
        env:
          # Evita obrir una finestra gràfica en CI
          ELECTRON_DISABLE_GPU: '1'

      - name: Pujar AppImage
        uses: actions/upload-artifact@v4
        with:
          name: HoresFreelance-Linux-AppImage-C${{ github.run_number }}
          path: app_PWA/horesfreelance/dist-electron/*.AppImage
          retention-days: 30

      - name: Pujar .deb
        uses: actions/upload-artifact@v4
        with:
          name: HoresFreelance-Linux-deb-C${{ github.run_number }}
          path: app_PWA/horesfreelance/dist-electron/*.deb
          retention-days: 30

  # ─────────────────────────────────────────────
  # 3. Electron Windows → .exe (NSIS)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Electron Windows
    runs-on: windows-latest
    needs: build-pwa
    defaults:
      run:
        working-directory: app_PWA/horesfreelance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          package-manager: pnpm
          cache: 'pnpm'
          cache-dependency-path: app_PWA/horesfreelance/pnpm-lock.yaml

      - name: Instal·lar dependències
        run: pnpm install

      - name: Build Vite + Electron (Windows)
        run: pnpm run electron:build:win
        env:
          ELECTRON_DISABLE_GPU: '1'

      - name: Pujar .exe
        uses: actions/upload-artifact@v4
        with:
          name: HoresFreelance-Windows-exe-C${{ github.run_number }}
          path: app_PWA/horesfreelance/dist-electron/*.exe
          retention-days: 30

  # ─────────────────────────────────────────────
  # 4. Electron macOS → .dmg
  # ─────────────────────────────────────────────
  build-macos:
    name: Build Electron macOS
    runs-on: macos-latest
    needs: build-pwa
    defaults:
      run:
        working-directory: app_PWA/horesfreelance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          package-manager: pnpm
          cache: 'pnpm'
          cache-dependency-path: app_PWA/horesfreelance/pnpm-lock.yaml

      - name: Instal·lar dependències
        run: pnpm install

      - name: Build Vite + Electron (macOS)
        run: pnpm run electron:build:mac
        env:
          ELECTRON_DISABLE_GPU: '1'
          # Sense credencials de firma d'Apple, es genera sense notaritzar (útil per ús personal)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Pujar .dmg
        uses: actions/upload-artifact@v4
        with:
          name: HoresFreelance-macOS-dmg-C${{ github.run_number }}
          path: app_PWA/horesfreelance/dist-electron/*.dmg
          retention-days: 30
